AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Delphinium Prospectus — Go API + static frontend

Globals:
  Function:
    Timeout: 30
    MemorySize: 256
    Runtime: provided.al2023
    Architectures: [x86_64]
    Environment:
      Variables:
        QUOTES_TABLE: !Ref QuotesTable
        PDF_BUCKET: !Ref PdfBucket
        WEB_BASE_URL: !Sub 'https://${CloudFrontDistribution.DomainName}'
        PROSPECTUS_BASE_URL: !Sub 'https://${CloudFrontDistribution.DomainName}'
        HUBSPOT_ACCESS_TOKEN: !Ref HubspotAccessToken
        SLACK_BOT_TOKEN: !Ref SlackBotToken
        SLACK_QUOTES_CHANNEL: !Ref SlackQuotesChannel

Parameters:
  HubspotAccessToken:
    Type: String
    Default: ''
    NoEcho: true
  SlackBotToken:
    Type: String
    Default: ''
    NoEcho: true
  SlackQuotesChannel:
    Type: String
    Default: ''

Resources:
  QuotesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: delphinium-quotes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: quoteId
          AttributeType: S
      KeySchema:
        - AttributeName: quoteId
          KeyType: HASH

  PdfBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: prospectus-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          ForwardedValues:
            QueryString: true
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  ProspectusApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, POST, PATCH, OPTIONS]
        AllowHeaders: [Content-Type, Authorization, X-Api-Key]

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      Handler: bootstrap
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuotesTable
        - S3CrudPolicy:
            BucketName: !Ref PdfBucket
      Events:
        PostQuotes:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes
            Method: POST
        GetQuotes:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes
            Method: GET
        PostPreview:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes/preview
            Method: POST
        PostFormLink:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes/form-link
            Method: POST
        GetQuoteById:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes/{id}
            Method: GET
        PatchQuote:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes/{id}
            Method: PATCH
        PostPdf:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes/{id}/pdf
            Method: POST
        PostNotify:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /quotes/{id}/notify
            Method: POST
        OptionsCatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref ProspectusApi
            Path: /{proxy+}
            Method: OPTIONS

Outputs:
  ApiUrl:
    Value: !Sub 'https://${ProspectusApi}.execute-api.${AWS::Region}.amazonaws.com'
  CloudFrontUrl:
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  FrontendBucketName:
    Value: !Ref FrontendBucket
  QuotesTableName:
    Value: !Ref QuotesTable
  PdfBucketName:
    Value: !Ref PdfBucket
